<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jura - Débats parlementaires</title>
    <meta name="theme-color" content="#1D5C9E">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="header-main">
                <h1><img src="ju.svg" alt="JU" class="header-logo"><a href="home.html" style="color: inherit; text-decoration: none;">Le Jura aux Chambres fédérales</a></h1>
                <nav>
                    <a href="home.html">Accueil</a>
                    <a href="elus.html">Nos élus</a>
                    <a href="objects.html">Objets</a>
                    <a href="debates.html" class="active">Débats</a>
                    <a href="stats.html">Statistiques</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="search-section">
            <h2>Débats parlementaires</h2>
            <p class="section-intro">Interventions orales mentionnant le Jura lors des débats au Conseil national et au Conseil des États.</p>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Rechercher dans les débats...">
                <button id="clearSearch" class="btn-clear" title="Effacer">✕</button>
            </div>
            <div class="filters">
                <div class="filter-dropdown" id="legislatureDropdown">
                    <button class="filter-btn" type="button">Législature <span class="filter-count"></span></button>
                    <div class="filter-menu" id="legislatureMenu">
                        <label class="select-all"><input type="checkbox" data-select-all checked> Toutes</label>
                        <label><input type="checkbox" value="52"> 52ème (dès déc. 2023)</label>
                        <label><input type="checkbox" value="51"> 51ème (déc. 2019 - sept. 2023)</label>
                        <label><input type="checkbox" value="50"> 50ème (déc. 2015 - sept. 2019)</label>
                    </div>
                </div>
                <div class="filter-dropdown" id="yearDropdown">
                    <button class="filter-btn" type="button">Année <span class="filter-count"></span></button>
                    <div class="filter-menu" id="yearMenu">
                    </div>
                </div>
                <div class="filter-dropdown" id="sessionDropdown">
                    <button class="filter-btn" type="button">Session <span class="filter-count"></span></button>
                    <div class="filter-menu" id="sessionMenu">
                    </div>
                </div>
                <div class="filter-dropdown" id="councilDropdown">
                    <button class="filter-btn" type="button">Conseil <span class="filter-count"></span></button>
                    <div class="filter-menu" id="councilMenu">
                    </div>
                </div>
                <div class="filter-dropdown" id="partyDropdown">
                    <button class="filter-btn" type="button">Parti <span class="filter-count"></span></button>
                    <div class="filter-menu" id="partyMenu">
                    </div>
                </div>
                <div class="filter-dropdown" id="departmentDropdown">
                    <button class="filter-btn" type="button">Autorité <span class="filter-count"></span></button>
                    <div class="filter-menu" id="departmentMenu">
                    </div>
                </div>
                <div class="filter-dropdown" id="tagsDropdown">
                    <button class="filter-btn" type="button">Thématiques <span class="filter-count"></span></button>
                    <div class="filter-menu" id="tagsMenu">
                    </div>
                </div>
                <div class="filter-theme-toggle">
                    <button class="theme-toggle-btn badge-theme-jura" data-theme="Jura" type="button">Jura</button>
                    <button class="theme-toggle-btn badge-theme-moutier" data-theme="Moutier" type="button">Moutier</button>
                    <button class="theme-toggle-btn badge-theme-rpt" data-theme="RPT" type="button">RPT</button>
                </div>
                <div class="filter-actions">
                    <button class="filter-reset" id="resetFilters" title="Réinitialiser les filtres">↻</button>
                    <button class="filter-new-updates" id="showNewUpdates" title="Afficher les nouveautés">Nouveautés</button>
                </div>
            </div>
        </section>

        <section class="results-section">
            <div class="results-header">
                <span id="resultsCount">Chargement...</span>
                <button id="sortOrderBtn" class="btn-sort" title="Inverser l'ordre">↓ Récent</button>
                <span id="lastUpdate"></span>
            </div>
            <div id="results" class="results-grid">
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>Données: <a href="https://ws-old.parlament.ch/" target="_blank">API du Parlement suisse</a></p>
            <p>Source: <a href="https://github.com/SwissParlMonitoring/Jura" target="_blank">GitHub</a></p>
            <p class="feedback-box"><a href="mailto:swissparl.scoff507@passmail.net">Feedback ?</a></p>
        </div>
    </footer>

    <button id="scrollTopBtn" class="scroll-top-btn" title="Retour en haut">↑</button>
    <script src="llm_config.js"></script>
    <script src="llm_summary.js"></script>
    <script src="debates.js"></script>
    <script>
        const scrollBtn = document.getElementById('scrollTopBtn');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 400) {
                scrollBtn.classList.add('visible');
            } else {
                scrollBtn.classList.remove('visible');
            }
        });
        scrollBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
