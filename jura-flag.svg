<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 350">
  <!-- Fond blanc -->
  <rect width="350" height="350" fill="white"/>
  
  <!-- Bandes rouges côté droit (4 bandes) -->
  <rect x="175" y="0" width="175" height="50" fill="#E54B4B"/>
  <rect x="175" y="100" width="175" height="50" fill="#E54B4B"/>
  <rect x="175" y="200" width="175" height="50" fill="#E54B4B"/>
  <rect x="175" y="300" width="175" height="50" fill="#E54B4B"/>
  
  <!-- Crosse épiscopale (côté gauche) -->
  <g fill="#E54B4B" stroke="#333" stroke-width="1">
    <!-- Volute (spirale) -->
    <path d="M88,25 
             C45,25 25,55 25,95
             C25,145 55,175 95,175
             C120,175 135,160 135,135
             C135,110 115,95 90,95
             C70,95 55,110 55,130
             C55,145 65,155 80,155
             C90,155 97,148 97,138" 
          fill="none" stroke="#E54B4B" stroke-width="18" stroke-linecap="round"/>
    
    <!-- Anneaux -->
    <rect x="68" y="175" width="44" height="12" rx="2"/>
    <rect x="72" y="192" width="36" height="8" rx="2"/>
    
    <!-- Tige -->
    <rect x="78" y="205" width="24" height="95"/>
    
    <!-- Pointe -->
    <polygon points="78,300 90,330 102,300"/>
  </g>
</svg>
